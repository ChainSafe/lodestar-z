name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: release please
    runs-on: ubuntu-latest
    steps:
      # Prefer a fine-grained PAT or GitHub App token over the default GITHUB_TOKEN:
      # PRs and releases created with GITHUB_TOKEN do not trigger other workflows,
      # so CI would not run on release PRs and publish-bindings would not fire on
      # release publication. Falls back to GITHUB_TOKEN if the secret is unset.
      - name: Run release-please
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
