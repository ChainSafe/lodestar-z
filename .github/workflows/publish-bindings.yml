name: Release
on:
  push:
    branches:
      - main

env:
  ZIG_VERSION: "0.16.0"
  NODE_VERSION: "24"

jobs:
  release-please:
    name: release please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # Runs with the default GITHUB_TOKEN — no PAT required. Publishing does
      # not depend on event chaining: it runs as the next job in this same
      # workflow run, gated on the release-please output.
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-bindings:
    name: publish bindings
    needs: release-please
    # Publishes only in the workflow run where release-please created the
    # release, i.e. the push of the release PR merge commit — the exact commit
    # that was tagged. There is deliberately no manual publish trigger, and
    # hand-created GitHub releases trigger nothing. To retry a failed publish,
    # rerun the failed job (`gh run rerun --failed`); it re-executes against
    # the same commit.
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    # [Lodestar CI] still runs on Ubuntu 22.04, which ships an incompatible GLIBC version
    # compared to ubuntu-latest runners.
    # This [incompatibility] causes DLOPEN to fail when loading bindings on those runners.
    #
    # Given that Ubuntu 22.04 has [security support until May 2027], this should be a good version to pin to until then.
    #
    # [Lodestar CI]: https://github.com/search?q=repo%3AChainSafe%2Flodestar+warp-ubuntu-2204&type=code
    # [incompatibility]: https://github.com/ChainSafe/lodestar/actions/runs/24988157940/job/73166634073?pr=8900
    # [security support until May 2027]: https://ubuntu.com/about/release-cycle
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
          cache-key: ubuntu-latest-${{ env.ZIG_VERSION }}
      - name: Install dependencies
        run: |
          pnpm install
      - name: Run bindings formatter
        run: |
          pnpm biome ci
      - name: Determine npm dist tag
        id: detect_dist_tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            # Prerelease: derive tag from the prerelease identifier (e.g. 0.1.2-rc.0 -> rc)
            TAG="${VERSION#*-}"
            TAG="${TAG%%.*}"
            echo "Prerelease version $VERSION.$TAG"
            echo "tag_flag=--tag $TAG" >> "$GITHUB_OUTPUT"
          else
            echo "Stable version $VERSION -> npm default dist-tag"
            echo "tag_flag=" >> "$GITHUB_OUTPUT"
          fi
      - name: Build and publish to npm
        run: |
          pnpm zapi build-artifacts --optimize ReleaseSafe
          pnpm zapi prepublish
          rm -rf zig-out/lib
          pnpm zapi publish --access public -- --ignore-scripts --provenance ${{ steps.detect_dist_tag.outputs.tag_flag }}
