# lodestar-z Kurtosis devnet config
# Run with: kurtosis run github.com/ethpandaops/ethereum-package --args-file kurtosis-devnet.yaml --image-download always

participants:
  # lodestar-z (our Zig beacon node) + Reth EL
  - cl_type: lodestar
    cl_image: lodestar-z:local
    el_type: reth
    count: 1
    validator_count: 32
    supernode: true
    cl_extra_params:
      - --network
      - minimal
      - --api-port
      - "5052"
      - --p2p-port
      - "9000"

  # Reference: Lighthouse + Geth (known-good pair)
  - cl_type: lighthouse
    el_type: geth
    count: 1
    validator_count: 32
    supernode: true

  # Reference: Lodestar (TS) + Reth
  - cl_type: lodestar
    el_type: reth
    count: 1
    validator_count: 32
    supernode: true

network_params:
  electra_fork_epoch: 0
  seconds_per_slot: 6
  genesis_delay: 30
  num_validator_keys_per_node: 32

additional_services:
  - dora
  - assertoor

assertoor_params:
  run_stability_check: true
  run_block_proposal_check: true

global_log_level: "debug"

port_publisher:
  cl:
    enabled: true
    public_port_start: 33000
  el:
    enabled: true
    public_port_start: 32000
